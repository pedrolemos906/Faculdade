<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placar - OnLife</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <header class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-2 border-bottom border-dark">
        <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-dark text-decoration-none">
            <img src="assets/images/logo.png" width="50" height="40" class="me-2 mx-3" alt="Logo OnLife">
            <span class="fs-2 fw-bold">OnLife</span>
        </a>
        <div class="col-md-3 text-end pe-4">
            <button type="button" class="btn btn-dark px-5">Sair</button>
        </div>
    </header>

    <main class="d-flex flex-grow-1">

        <aside>
            <div class="d-flex flex-column flex-shrink-0 p-3 border-end border-dark h-100" style="width: 180px;">
                <ul class="nav nav-pills flex-column mb-auto">
                    <li class="nav-item">
                        <a href="#" class="nav-link link-dark">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link link-dark">Tarefas</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link link-dark">Cronômetro</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link link-dark">Meu Perfil</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link active bg-secondary-subtle text-dark" aria-current="page">Placar</a>
                    </li>
                </ul>
            </div>
        </aside>

        <section class="placar-page">

            <h1>Placar</h1>
            <h2 id="nome-grupo">Carregando...</h2>

            <!-- GERENCIAR GRUPO -->
            <div class="gerenciar-grupo">
                <button id="btn-gerenciar" class="btn-gerenciar" onclick="toggleGerenciar()">Gerenciar Grupo</button>
                
                <div id="painel-gerenciar" style="display: none;">
                    
                    <div class="adicionar-usuario">
                        <input type="text" id="input-nome" placeholder="Nome do usuário">
                        <button onclick="adicionarUsuario()">Adicionar</button>
                    </div>

                    <div id="lista-gerenciar"></div>

                </div>
            </div>

            <!-- PÓDIO -->
            <div class="podio">
                <div class="podio-item" id="podio-2">
                    <img class="podio-foto" id="foto-2" src="" alt="">
                    <div class="podio-nome" id="nome-2"></div>
                    <div class="podio-pts" id="pts-2"></div>
                    <div class="podio-pedestal pedestal-2">2º</div>
                </div>
                <div class="podio-item" id="podio-1">
                    <img class="podio-foto" id="foto-1" src="" alt="">
                    <div class="podio-nome" id="nome-1"></div>
                    <div class="podio-pts" id="pts-1"></div>
                    <div class="podio-pedestal pedestal-1">1º</div>
                </div>
                <div class="podio-item" id="podio-3">
                    <img class="podio-foto" id="foto-3" src="" alt="">
                    <div class="podio-nome" id="nome-3"></div>
                    <div class="podio-pts" id="pts-3"></div>
                    <div class="podio-pedestal pedestal-3">3º</div>
                </div>
            </div>

            <!-- LISTA COMPLETA -->
            <h3 class="lista-title">Classificação completa</h3>
            <div id="lista-placar"></div>

        </section>

    </main>

    <footer class="bg-dark text-light py-3 mt-auto px-4">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
            <div>OnLife &copy; 2026. All rights reserved.</div>
            <div class="footer-icons">
                <i class="bi bi-youtube"></i>
                <i class="bi bi-facebook"></i>
                <i class="bi bi-instagram"></i>
                <i class="bi bi-linkedin"></i>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="assets/js/placar.js"></script>
</body>
</html>
