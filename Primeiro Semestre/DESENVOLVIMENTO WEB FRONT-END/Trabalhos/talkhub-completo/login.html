<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — TalkHub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- CABEÇALHO -->
  <nav class="navbar navbar-expand-md cabecalho fixed-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <img src="imagens/logo.svg" alt="TalkHub" height="38" />
      </a>
      <a href="register.html" class="btn btn-primary">criar conta</a>
    </div>
  </nav>


  <!-- FORMULÁRIO DE LOGIN -->
  <main class="pagina-form">
    <div class="form-caixa">

      <div class="form-caixa__logo">
        <img src="imagens/logo.svg" alt="TalkHub" height="44" />
      </div>

      <h1 class="form-caixa__titulo">Boas-vindas de volta</h1>
      <p class="form-caixa__subtitulo">Entre na sua conta para encontrar parceiros</p>

      <form action="dashboard.html">

        <div class="mb-3">
          <label class="form-label" for="email">E-mail</label>
          <input class="form-control" type="email" id="email" placeholder="seu@email.com" required />
        </div>

        <div class="mb-4">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label class="form-label mb-0" for="senha">Senha</label>
            <a href="#" class="campo__link">Esqueceu a senha?</a>
          </div>
          <input class="form-control" type="password" id="senha" placeholder="••••••••" required />
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2">Entrar</button>

      </form>

      <p class="form-caixa__rodape">
        Não tem uma conta?
        <a href="register.html" class="form-caixa__link">Criar conta grátis</a>
      </p>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
