<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 445 135" role="img">
  <title>TalkHub</title>

  <!-- Balão esquerdo — roxo claro (#7F77DD) -->
  <path
    d="M 20,5 L 115,5 Q 130,5 130,20 L 130,80 Q 130,95 115,95 L 38,95 L 5,118 L 22,95 L 20,95 Q 5,95 5,80 L 5,20 Q 5,5 20,5 Z"
    fill="#7F77DD"
  />

  <!-- Balão direito — roxo principal (#534AB7), sobrepõe o esquerdo -->
  <path
    d="M 80,20 L 165,20 Q 180,20 180,35 L 180,93 Q 180,108 165,108 L 188,130 L 145,108 L 80,108 Q 65,108 65,93 L 65,35 Q 65,20 80,20 Z"
    fill="#534AB7"
  />

  <!-- Ícone de rede/compartilhar (branco) dentro do balão direito -->
  <!-- Linhas conectando os 3 nós -->
  <line x1="107" y1="64" x2="138" y2="44" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="107" y1="64" x2="138" y2="84" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="138" y1="44" x2="138" y2="84" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Círculos nos nós -->
  <circle cx="107" cy="64" r="7" fill="white"/>
  <circle cx="138" cy="44" r="7" fill="white"/>
  <circle cx="138" cy="84" r="7" fill="white"/>

  <!-- Texto: "Talk" em roxo claro, "Hub" em roxo principal -->
  <text
    font-family="Arial, Helvetica, sans-serif"
    font-size="58"
    font-weight="700"
    y="90"
  >
    <tspan x="205" fill="#7F77DD">Talk</tspan><tspan fill="#534AB7">Hub</tspan>
  </text>

</svg>
