<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Blog Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header>
    <h1>Meu Blog Game</h1>
    <nav>
      <ul>
        <li><a href="#sobremim">Sobre mim</a></li>
        <li><a href="#menu">Menu</a></li>
      </ul>
    </nav>
  </header>

  <!-- Bem-vindo -->
  <section class="welcome">
    <h2>Post</h2>
    <p>
      Um espaço minimalista inspirado na lógica dos games, onde cada conquista e desafio é um nível superado.
      Aqui compartilho aprendizados e sonhos em tempo real, sempre em busca do próximo nível.
    </p>
  </section>

  <!-- Posts em destaque -->
  <section id="featured" class="posts">
    <h2>Posts em destaque</h2>
    <div class="post-grid" id="featured-posts"></div>
  </section>

  <!-- Últimos posts -->
  <section id="recent" class="posts">
    <h2>Últimos posts</h2>
    <div class="post-grid" id="recent-posts"></div>
  </section>

  <!-- Rodapé -->
  <footer>
    <p>&copy; 2026 Meu Blog Game</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
